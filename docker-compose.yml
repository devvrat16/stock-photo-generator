version: '3.8'

services:
  mock-ai-photo-generator:
    build: .
    container_name: mock-ai-photo-generator
    ports:
      - "8081:8081"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-secure-secret}
      - SERVER_PORT=8081
      - JAVA_OPTS=-Xms256m -Xmx512m
    volumes:
      - ./generated-images:/app/generated-images
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
